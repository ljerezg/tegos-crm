name: IMAP Poll — Tegos CRM

on:
  schedule:
    # Cada 15 minutos
    - cron: '*/15 * * * *'
  # Permite lanzarlo manualmente desde GitHub → Actions
  workflow_dispatch:

jobs:
  poll:
    name: Sondeo IMAP
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: .github/scripts/package.json

      - name: Instalar dependencias
        run: npm install
        working-directory: .github/scripts

      - name: Ejecutar sondeo IMAP
        run: node .github/scripts/imap-poll.js
        env:
          IMAP_HOST:               ${{ secrets.IMAP_HOST }}
          IMAP_PORT:               ${{ secrets.IMAP_PORT }}
          IMAP_USER:               ${{ secrets.IMAP_USER }}
          IMAP_PASS:               ${{ secrets.IMAP_PASS }}
          SUPABASE_URL:            ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
